kind = "web"
previewPath = "/"
title = "Imperium"
version = "1.0.0"
id = "artifacts/imperium"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22990

[services.development]
run = "pnpm --filter @workspace/imperium run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imperium", "run", "build" ]
publicDir = "artifacts/imperium/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22990"
BASE_PATH = "/"
